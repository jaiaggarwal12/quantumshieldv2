version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=change-this-in-production
      - ADMIN_PASSWORD=quantum2026
      - DATABASE_URL=sqlite:///./quantumshield.db
    volumes:
      - db_data:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
